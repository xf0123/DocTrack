<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocTrack Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% if current_user %}
      <nav class="navbar navbar-expand-lg border-bottom mb-4 bg-body-tertiary">
        <div class="container">
          <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">DocTrack</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navLinks">
              <div class="navbar-nav me-auto">
                <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
                <a class="nav-link" href="{{ url_for('documents') }}">Documents</a>
                <a class="nav-link text-info" href="/executions">Executions</a>
                <a class="nav-link text-info" href="/samples">Samples</a>
                <a class="nav-link text-warning" href="/projects">Projects (Kanban)</a>
                <a class="nav-link text-success" href="/attendance">Attendance</a>
              </div>
              <div class="navbar-nav ms-auto d-flex align-items-center gap-2">
                <a class="nav-link" href="{{ url_for('setup') }}">Setup</a>
                <span class="badge text-bg-secondary">{{ current_user['username'] }}</span>
                <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('logout') }}">Logout</a>
              </div>
          </div>
        </div>
      </nav>
    {% endif %}

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <main class="container-fluid px-4 px-md-5 pb-4">
       {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
